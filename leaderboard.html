<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Deadwood Tournament — Sandbox VR</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --surface-base: #11161d; --surface-body: #19202a; --surface-alt: #202936;
  --greyscale-0: #ffffff;
  --text-full: #ffffff; --text-high: #c9d2dc; --text-medium: #a9b3c1; --text-low: #8895a7; --text-disabled: #4b5c71;
  --brand-cyan: #03b2cb; --brand-red-500: #f4250e; --brand-red-600: #db180a;
  --player-red: #e43838; --player-blue: #41b5eb; --player-green: #31a868; --player-yellow: #f5b31b;
  --border-color: #2d3846; --border-hover: #3b4a5b;
  --gold: #f5b31b; --silver: #a9b3c1; --bronze: #cd7f32;
  --qualified-green: #2ebd37;
}
html { font-size: 14px; }
body { background: var(--surface-base); color: var(--text-full); font-family: 'Gordita', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; overflow-x: hidden; -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased; }
.container { max-width: 1100px; margin: 0 auto; padding: 0.8rem 0.8rem; }
.header { text-align: center; margin-bottom: 0.8rem; }
.header-logo { max-width: 200px; margin: 0 auto 0.3rem; display: block; }
.header-logo img { width: 100%; height: auto; mix-blend-mode: lighten; }
.event-badge { display: inline-block; font-size: 0.55rem; font-weight: 500; letter-spacing: 0.094rem; text-transform: uppercase; color: var(--brand-cyan); border: 1px solid var(--brand-cyan); padding: 0.2rem 0.7rem; border-radius: 3px; margin-bottom: 0.4rem; background: rgba(3, 178, 203, 0.08); }
.event-name { font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.016rem; margin-top: 0.2rem; }
.event-subtitle { font-size: 0.75rem; font-weight: 400; color: var(--text-medium); letter-spacing: 0.016rem; margin-top: 0.2rem; }
.live-dot { display: inline-block; width: 6px; height: 6px; background: var(--brand-red-500); border-radius: 50%; margin-right: 4px; -webkit-animation: pulse 1.5s ease-in-out infinite; animation: pulse 1.5s ease-in-out infinite; vertical-align: middle; }
@-webkit-keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.header-line { width: 60px; height: 2px; background: linear-gradient(90deg, transparent, var(--brand-cyan), transparent); margin: 0.5rem auto 0; }
.phase-tabs { display: -webkit-flex; display: flex; justify-content: center; margin-bottom: 2rem; border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; max-width: 360px; margin-left: auto; margin-right: auto; }
.phase-tab { -webkit-flex: 1; flex: 1; padding: 0.65rem 1.2rem; font-family: inherit; font-size: 0.875rem; font-weight: 500; letter-spacing: 0.063rem; text-transform: uppercase; background: transparent; color: var(--text-low); border: none; -webkit-appearance: none; -webkit-tap-highlight-color: transparent; cursor: pointer; }
.phase-tab:first-child { border-right: 1px solid var(--border-color); }
.phase-tab.active { background: var(--brand-cyan); color: var(--greyscale-0); }
.stats-bar { display: -webkit-flex; display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 0.6rem; padding: 0.4rem 0; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }
.stat-item { text-align: center; }
.stat-value { font-size: 0.95rem; font-weight: 700; line-height: 1.2rem; }
.stat-label { font-size: 0.55rem; font-weight: 500; letter-spacing: 0.094rem; text-transform: uppercase; color: var(--text-low); margin-top: 0.1rem; }
.leaderboard { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; gap: 4px; }
.team-row { display: grid; grid-template-columns: 32px 1fr 110px 100px; -webkit-align-items: center; align-items: center; background: var(--surface-body); border: 1px solid var(--border-color); border-radius: 6px; padding: 0.45rem 0.6rem; cursor: pointer; -webkit-tap-highlight-color: transparent; -webkit-transition: background 0.15s; transition: background 0.15s; -webkit-animation: slideIn 0.3s ease forwards; animation: slideIn 0.3s ease forwards; opacity: 0; }
.team-row:hover, .team-row:active { background: var(--surface-alt); border-color: var(--border-hover); }
.team-row.rank-1 { border-left: 3px solid var(--gold); }
.team-row.rank-2 { border-left: 3px solid var(--silver); }
.team-row.rank-3 { border-left: 3px solid var(--bronze); }
.team-row.rank-1 .rank-num { color: var(--gold); }
.team-row.rank-2 .rank-num { color: var(--silver); }
.team-row.rank-3 .rank-num { color: var(--bronze); }
.rank-num { font-size: 1rem; font-weight: 700; color: var(--text-disabled); text-align: center; }
.team-info { min-width: 0; }
.team-name { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.031rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.team-players { font-size: 0.6rem; font-weight: 400; color: var(--text-low); letter-spacing: 0.025rem; margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.team-sid { font-size: 0.5rem; font-weight: 400; color: var(--text-disabled); letter-spacing: 0.02rem; margin-top: 0.05rem; font-family: monospace; }
.team-score { text-align: right; padding-right: 0.5rem; }
.score-value { font-size: 0.95rem; font-weight: 700; letter-spacing: 0.016rem; }
.score-label { font-size: 0.5rem; font-weight: 500; color: var(--text-low); text-transform: uppercase; letter-spacing: 0.094rem; }
.team-meta { text-align: right; font-size: 0.6rem; font-weight: 400; color: var(--text-medium); letter-spacing: 0.025rem; line-height: 1.4; }
.qualified-tag { color: var(--qualified-green); font-weight: 500; }
.team-details { max-height: 0; overflow: hidden; -webkit-transition: max-height 0.3s ease; transition: max-height 0.3s ease; background: var(--surface-base); border: 1px solid var(--border-color); border-top: none; border-radius: 0 0 6px 6px; margin-top: -3px; }
.team-details.open { max-height: 800px; }
.details-inner { padding: 0.4rem 0.5rem; }
.player-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
.player-card { background: var(--surface-body); border: 1px solid var(--border-color); border-radius: 4px; padding: 0.35rem 0.5rem; position: relative; }
.player-card.is-mvp { background: #2a2e3a; }
.mvp-tag { position: absolute; top: 0.25rem; right: 0.4rem; font-size: 0.5rem; font-weight: 700; color: var(--gold); letter-spacing: 0.094rem; text-transform: uppercase; }
.player-name { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.016rem; }
.player-weapon { font-size: 0.55rem; font-weight: 400; color: var(--text-low); letter-spacing: 0.025rem; margin-bottom: 0.2rem; }
.player-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.1rem 0.5rem; font-size: 0.6rem; }
.player-stat { display: -webkit-flex; display: flex; -webkit-justify-content: space-between; justify-content: space-between; }
.player-stat-label { color: var(--text-low); font-weight: 400; }
.player-stat-value { font-weight: 500; color: var(--text-high); font-variant-numeric: tabular-nums; }
.player-card[data-color="red"] { border-top: 2px solid var(--player-red); }
.player-card[data-color="blue"] { border-top: 2px solid var(--player-blue); }
.player-card[data-color="green"] { border-top: 2px solid var(--player-green); }
.player-card[data-color="yellow"] { border-top: 2px solid var(--player-yellow); }
.wave-timeline-container { margin-top: 0.3rem; padding-top: 0.3rem; border-top: 1px solid var(--border-color); }
.wave-timeline-label { font-size: 0.5rem; font-weight: 500; color: var(--text-low); text-transform: uppercase; letter-spacing: 0.094rem; margin-bottom: 0.3rem; }
.wave-timeline { position: relative; overflow-x: auto; overflow-y: visible; padding: 0.1rem 0 1.2rem; -webkit-overflow-scrolling: touch; }
.wave-timeline-track { display: -webkit-flex; display: flex; -webkit-align-items: flex-start; align-items: flex-start; position: relative; min-width: 100%; }
.wave-node { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; -webkit-align-items: center; align-items: center; position: relative; -webkit-flex-shrink: 0; flex-shrink: 0; z-index: 2; }
.wave-node-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--brand-cyan); border: 1px solid var(--surface-base); box-shadow: 0 0 0 1px var(--brand-cyan); -webkit-transition: transform 0.15s; transition: transform 0.15s; position: relative; z-index: 2; }
.wave-node:hover .wave-node-dot { -webkit-transform: scale(1.4); transform: scale(1.4); }
.wave-node-score { font-size: 0.5rem; font-weight: 600; color: var(--text-high); margin-top: 0.2rem; font-variant-numeric: tabular-nums; white-space: nowrap; }
.wave-node-wave { font-size: 0.45rem; font-weight: 500; color: var(--text-disabled); text-transform: uppercase; letter-spacing: 0.05rem; margin-top: 0.05rem; }
.wave-node-delta { font-size: 0.45rem; font-weight: 400; color: var(--text-low); margin-top: 0.02rem; white-space: nowrap; }
.wave-connector { -webkit-flex: 1; flex: 1; height: 2px; background: var(--border-color); margin-top: 4px; min-width: 20px; position: relative; z-index: 1; }
.wave-connector-fill { height: 100%; background: linear-gradient(90deg, var(--brand-cyan), rgba(3, 178, 203, 0.4)); border-radius: 1px; }
.finals-bracket { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 1rem; }
.finals-card { background: var(--surface-body); border: 1px solid var(--border-color); border-radius: 8px; padding: 1.2rem 0.8rem; text-align: center; }
.finals-card.winner { border-color: var(--gold); box-shadow: 0 0 20px rgba(245, 179, 27, 0.08); }
.finals-rank { font-size: 2rem; font-weight: 700; line-height: 1; }
.finals-card:nth-child(1) .finals-rank { color: var(--gold); }
.finals-card:nth-child(2) .finals-rank { color: var(--silver); }
.finals-card:nth-child(3) .finals-rank { color: var(--bronze); }
.finals-card:nth-child(4) .finals-rank { color: var(--text-disabled); }
.finals-team-name { font-size: 0.875rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.016rem; margin: 0.5rem 0 0.25rem; }
.finals-score { font-size: 0.875rem; font-weight: 500; color: var(--text-medium); }
.finals-prize { font-size: 0.75rem; font-weight: 700; color: var(--gold); margin-top: 0.4rem; }
.refresh-bar { text-align: center; padding: 1.2rem 0 0.5rem; font-size: 0.75rem; font-weight: 400; color: var(--text-disabled); letter-spacing: 0.025rem; }
.refresh-bar .countdown { color: var(--text-medium); }
@-webkit-keyframes slideIn { from{opacity:0;-webkit-transform:translateY(8px)} to{opacity:1;-webkit-transform:translateY(0)} }
@keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@media (min-width: 701px) {
  html { font-size: 18px; }
}
@media (max-width: 700px) {
  .container { padding: 0.6rem 0.5rem; }
  .header-logo { max-width: 160px; }
  .event-name { font-size: 0.9rem; }
  .team-row { grid-template-columns: 28px 1fr 80px; padding: 0.35rem 0.5rem; }
  .team-meta { display: none; }
  .stats-bar { gap: 1rem; }
  .stat-value { font-size: 0.85rem; }
  .player-grid { grid-template-columns: repeat(2, 1fr); }
  .finals-bracket { grid-template-columns: 1fr 1fr; gap: 6px; }
  .score-value { font-size: 0.85rem; }
}
</style>
</head>

function formatScore(n) { return n.toLocaleString(); }

function renderLeaderboard() {
  var container = document.getElementById('leaderboard');
  if (!container) return;
  container.innerHTML = '';
  var teams = DATA.qualifying;
  for (var i = 0; i < teams.length; i++) {
    (function(idx) {
      var team = teams[idx];
      var rank = idx + 1;
      var rankClass = idx < 3 ? ' rank-' + rank : '';
      var qualifyTag = '';
      var row = document.createElement('div');
      row.className = 'team-row' + rankClass;
      row.style.animationDelay = (0.05 * (idx + 1)) + 's';
      row.style.webkitAnimationDelay = (0.05 * (idx + 1)) + 's';
      var playerNames = [];
      for (var pn = 0; pn < team.players.length; pn++) { playerNames.push(team.players[pn].name); }
      row.innerHTML =
        '<div class="rank-num">' + rank + '</div>' +
        '<div class="team-info"><div class="team-name">' + team.name + '</div><div class="team-players">' + playerNames.join(' &middot; ') + '</div>' + (team.sid ? '<div class="team-sid">' + team.sid + '</div>' : '') + '</div>' +
        '<div class="team-score"><div class="score-value">' + formatScore(team.score) + '</div><div class="score-label">Total Score</div></div>' +
        '<div class="team-meta"><div>' + team.deaths + ' deaths</div><div>' + (team.rating ? team.rating + '/5 &#9733;' : '') + (team.maxCombo ? ' &middot; Combo ' + team.maxCombo : '') + '</div></div>';
      row.addEventListener('click', function() {
        var det = document.getElementById('details-' + idx);
        if (det) { if (det.className.indexOf('open') >= 0) { det.className = det.className.replace(' open', ''); } else { det.className = det.className + ' open'; } }
      });
      container.appendChild(row);
      var details = document.createElement('div');
      details.className = 'team-details' + (idx < 4 ? ' open' : '');
      details.id = 'details-' + idx;

      // Players
      var playersHtml = '';
      for (var p = 0; p < team.players.length; p++) {
        var pl = team.players[p];
        playersHtml +=
          '<div class="player-card' + (pl.mvp ? ' is-mvp' : '') + '" data-color="' + (pl.color || '') + '">' +
            (pl.mvp ? '<div class="mvp-tag">&#9733; MVP</div>' : '') +
            '<div class="player-name">' + pl.name + '</div><div class="player-weapon">' + pl.weapon + '</div>' +
            '<div class="player-stats">' +
              '<div class="player-stat"><span class="player-stat-label">Score</span><span class="player-stat-value">' + formatScore(pl.score) + '</span></div>' +
              '<div class="player-stat"><span class="player-stat-label">Kills</span><span class="player-stat-value">' + pl.kills + '</span></div>' +
              '<div class="player-stat"><span class="player-stat-label">Headshots</span><span class="player-stat-value">' + (pl.headshots || 0) + '</span></div>' +
              '<div class="player-stat"><span class="player-stat-label">Deaths</span><span class="player-stat-value">' + pl.deaths + '</span></div>' +
            '</div></div>';
      }

      // Wave timeline — only uses real data: wave number + score
      var timelineHtml = '';
      var cumulative = 0;
      for (var w = 0; w < team.waveScore.length; w++) {
        var wScore = team.waveScore[w];
        cumulative += wScore;
        timelineHtml += '<div class="wave-node">' +
          '<div class="wave-node-dot"></div>' +
          '<div class="wave-node-score">' + formatScore(cumulative) + '</div>' +
          '<div class="wave-node-wave">W' + (w + 1) + '</div>' +
          '<div class="wave-node-delta">+' + formatScore(wScore) + '</div>' +
        '</div>';
        if (w < team.waveScore.length - 1) {
          timelineHtml += '<div class="wave-connector"><div class="wave-connector-fill" style="width:100%"></div></div>';
        }
      }

      details.innerHTML = '<div class="details-inner"><div class="player-grid">' + playersHtml + '</div>' +
        '<div class="wave-timeline-container">' +
          '<div class="wave-timeline-label">Wave Progress</div>' +
          '<div class="wave-timeline"><div class="wave-timeline-track">' + timelineHtml + '</div></div>' +
        '</div></div>';
      container.appendChild(details);
    })(i);
  }
}

function renderFinals() {
  var container = document.getElementById('finals-bracket');
  if (!container) return;
  var html = '';
  for (var i = 0; i < DATA.finals.length; i++) {
    var t = DATA.finals[i];
    html += '<div class="finals-card' + (i === 0 ? ' winner' : '') + '"><div class="finals-rank">#' + (i+1) + '</div><div class="finals-team-name">' + t.name + '</div><div class="finals-score">' + formatScore(t.score) + '</div><div class="finals-prize">' + t.prize + '</div></div>';
  }
  container.innerHTML = html;
}

function updateStats() {
  var teams = DATA.qualifying;
  var el1 = document.getElementById('stat-teams');
  var el2 = document.getElementById('stat-highscore');
  var el3 = document.getElementById('stat-mostkills');
  if (el1) el1.textContent = teams.length;
  if (el2 && teams.length > 0) el2.textContent = formatScore(teams[0].score);
  var topKiller = '';
  var topKills = 0;
  for (var i = 0; i < teams.length; i++) {
    for (var j = 0; j < teams[i].players.length; j++) {
      if (teams[i].players[j].kills > topKills) {
        topKills = teams[i].players[j].kills;
        topKiller = teams[i].players[j].name;
      }
    }
  }
  if (el3) el3.textContent = topKiller;
}

function showPhase(phase) {
  var tabs = document.querySelectorAll('.phase-tab');
  for (var t = 0; t < tabs.length; t++) { tabs[t].className = tabs[t].className.replace(' active', ''); }
  if (phase === 'qualifying') { document.getElementById('qualifying-view').style.display = ''; document.getElementById('finals-view').style.display = 'none'; tabs[0].className = tabs[0].className + ' active'; }
  else { document.getElementById('qualifying-view').style.display = 'none'; document.getElementById('finals-view').style.display = ''; tabs[1].className = tabs[1].className + ' active'; }
}

document.addEventListener('DOMContentLoaded', function() {
  renderLeaderboard();
  renderFinals();
  updateStats();
  var tabs = document.querySelectorAll('.phase-tab');
  for (var t = 0; t < tabs.length; t++) { (function(tab) { tab.addEventListener('click', function() { showPhase(tab.getAttribute('data-phase')); }); })(tabs[t]); }
  var count = 15;
  setInterval(function() { count--; var el1 = document.getElementById('countdown'); var el2 = document.getElementById('countdown-finals'); if (el1) el1.textContent = count; if (el2) el2.textContent = count; if (count <= 0) { window.location.reload(); } }, 1000);
});
</script>
